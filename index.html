<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KOLIASA CONSTRUCTION</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000000;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <canvas id="pixelCanvas"></canvas>

    <script>
      const MM14_COLORS = ["#6B7D2B", "#4A5448", "#3D3D2D", "#D4C4A8"];

      class CanvasManager {
        constructor() {
          this.canvas = document.getElementById("pixelCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.dpr = window.devicePixelRatio || 1;
          this.particles = [];
          this.resizeTimeout = null;

          this.setupEventListeners();
          this.resize();
          this.init();
        }

        setupEventListeners() {
          window.addEventListener("resize", () => {
            clearTimeout(this.resizeTimeout);
            this.resizeTimeout = setTimeout(() => {
              this.resize();
              this.init();
            }, 150);
          });

          window.addEventListener("orientationchange", () => {
            setTimeout(() => {
              this.resize();
              this.init();
            }, 300);
          });
        }

        resize() {
          const width = window.innerWidth;
          const height = window.innerHeight;

          this.canvas.width = Math.floor(width * this.dpr);
          this.canvas.height = Math.floor(height * this.dpr);
          this.canvas.style.width = width + "px";
          this.canvas.style.height = height + "px";

          this.ctx.setTransform(1, 0, 0, 1, 0, 0);
          this.ctx.scale(this.dpr, this.dpr);

          this.logicalWidth = width;
          this.logicalHeight = height;
        }

        init() {
          const centerX = this.logicalWidth / 2;
          const centerY = this.logicalHeight / 2;
          const minDimension = Math.min(this.logicalWidth, this.logicalHeight);

          const fontSize =
            this.logicalWidth < 400
              ? Math.max(24, minDimension * 0.12)
              : this.logicalWidth < 768
                ? Math.max(32, minDimension * 0.14)
                : Math.max(40, Math.min(120, minDimension * 0.15));

          this.particles = this.generatePixelText("KOLIASA CONSTRUCTION", centerX, centerY, fontSize);
        }

        generatePixelText(text, centerX, centerY, fontSize) {
          const offscreenCanvas = document.createElement("canvas");
          const offscreenCtx = offscreenCanvas.getContext("2d");
          const padding = fontSize * 2;

          offscreenCtx.font = `bold ${fontSize}px Arial, sans-serif`;
          const metrics = offscreenCtx.measureText(text);
          const textWidth = Math.ceil(metrics.width) + padding;
          const textHeight = Math.ceil(fontSize * 1.4) + padding;

          offscreenCanvas.width = Math.max(1, textWidth);
          offscreenCanvas.height = Math.max(1, textHeight);

          const ctx = offscreenCanvas.getContext("2d");
          ctx.fillStyle = "#FFFFFF";
          ctx.font = `bold ${fontSize}px Arial, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(text, offscreenCanvas.width / 2, offscreenCanvas.height / 2);

          const imageData = ctx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
          const data = imageData.data;
          const particles = [];

          const basePixelSize = fontSize / 22;
          const pixelSize = Math.max(2, Math.min(6, Math.ceil(basePixelSize)));
          const skipFactor = Math.max(1, Math.floor(pixelSize / 2));

          for (let i = 0; i < data.length; i += 4 * skipFactor) {
            const alpha = data[i + 3];
            if (alpha > 128) {
              const pixelIndex = i / 4;
              const x = (pixelIndex % offscreenCanvas.width) - offscreenCanvas.width / 2;
              const y = Math.floor(pixelIndex / offscreenCanvas.width) - offscreenCanvas.height / 2;

              if (Math.random() < 0.4) {
                particles.push({
                  x: centerX + x,
                  y: centerY + y,
                  size: pixelSize,
                  color: MM14_COLORS[Math.floor(Math.random() * MM14_COLORS.length)],
                });
              }
            }
          }

          return particles;
        }

        render() {
          this.ctx.fillStyle = "#000000";
          this.ctx.fillRect(0, 0, this.logicalWidth, this.logicalHeight);

          for (let particle of this.particles) {
            this.ctx.fillStyle = particle.color;
            this.ctx.fillRect(
              particle.x - particle.size / 2,
              particle.y - particle.size / 2,
              particle.size,
              particle.size,
            );
          }
        }

        animate() {
          this.render();
          requestAnimationFrame(() => this.animate());
        }
      }

      window.addEventListener("load", () => {
        const manager = new CanvasManager();
        manager.animate();
      });
    </script>
  </body>
</html>
